name: "Kiwix (Offline Wiki)"
version: "1.1.20"
slug: "kiwix_offline"
description: "Kiwix server for local ZIM files on Home Assistant OS / Servidor Kiwix para arquivos ZIM locais no Home Assistant OS."
url: "https://github.com/yanmolinos/Kiwix-Addon"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
hassio_api: true
ingress: true
ingress_port: 8080
panel_title: "Kiwix"
panel_icon: mdi:book-open-page-variant
map:
  - share:rw
  - media:rw
options:
  zim_dir: "/share/kiwix"
  username: ""
  password: ""
schema:
  zim_dir: str
  username: str?
  password: password?
